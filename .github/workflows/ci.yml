name: CI

on:
  pull_request:
  push:
    branches:
      - "**"
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test and build
    runs-on: ubuntu-latest
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }} //it's generated automatically
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: "https://registry.npmjs.org/"
      - name: Install dependencies
        run: npm ci
      - name: Run tests
        run: npm test
      - name: Build the package
        run: npm run build

  create-release:
    name: Create Release
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs:
      - test
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }} //it's generated automatically
    outputs:
      release_created: ${{ steps.release_tag.outputs.release_created }}
      release_tag: ${{ steps.release_tag.outputs.release_tag }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: "https://registry.npmjs.org/"
      - name: Install dependencies
        run: npm ci
      - name: Create release metadata
        run: npx semantic-release
      - name: Fetch latest main and tags
        run: git fetch --force origin main --tags
      - name: Detect release tag on main HEAD
        id: release_tag
        shell: pwsh
        run: |
          git checkout origin/main
          $tag = git tag --points-at HEAD | Where-Object { $_ -match '^v\d+\.\d+\.\d+$' } | Select-Object -First 1
          if ($null -eq $tag -or [string]::IsNullOrWhiteSpace($tag)) {
            "release_created=false" >> $env:GITHUB_OUTPUT
            "release_tag=" >> $env:GITHUB_OUTPUT
            exit 0
          }
          "release_created=true" >> $env:GITHUB_OUTPUT
          "release_tag=$tag" >> $env:GITHUB_OUTPUT

  publish-npm:
    name: Publish NPM
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs:
      - create-release
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        if: needs.create-release.outputs.release_created == 'true'
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.create-release.outputs.release_tag }}
          fetch-depth: 0
      - name: Setup Node.js
        if: needs.create-release.outputs.release_created == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: "https://registry.npmjs.org/"
      - name: Install dependencies
        if: needs.create-release.outputs.release_created == 'true'
        run: npm ci
      - name: Build the package
        if: needs.create-release.outputs.release_created == 'true'
        run: npm run build
      - name: Publish to npm
        if: needs.create-release.outputs.release_created == 'true'
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --access public

  publish-jsr:
    name: Publish JSR
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs:
      - create-release
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout repository
        if: needs.create-release.outputs.release_created == 'true'
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.create-release.outputs.release_tag }}
          fetch-depth: 0
      - name: Setup Node.js
        if: needs.create-release.outputs.release_created == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install dependencies
        if: needs.create-release.outputs.release_created == 'true'
        run: npm ci
      - name: Publish to JSR
        if: needs.create-release.outputs.release_created == 'true'
        run: npx jsr publish --provenance

  deploy-docs:
    name: Deploy Docs
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs:
      - create-release
      - publish-npm
      - publish-jsr
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.create-release.outputs.release_created == 'true' && needs.create-release.outputs.release_tag || 'main' }}
          fetch-depth: 0
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Build documentation
        run: npm run docs:build
      - name: Setup Pages
        uses: actions/configure-pages@v4
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./docs
      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
